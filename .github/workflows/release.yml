name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  # Determine version and create release
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install package dependencies
        run: |
          (cd packages/shared && npm ci)
          (cd packages/ai-integration && npm ci)
          (cd packages/financial-tools && npm ci)
          (cd packages/mcp-server && npm ci)

      - name: Build all packages
        run: |
          (cd packages/shared && npm run build)
          (cd packages/ai-integration && npm run build)
          (cd packages/financial-tools && npm run build)
          (cd packages/mcp-server && npm run build)

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          else
            # Auto-determine from conventional commits
            if git log --format=%B -n 1 | grep -q "BREAKING CHANGE\|feat!"; then
              RELEASE_TYPE="major"
            elif git log --format=%B -n 1 | grep -q "^feat"; then
              RELEASE_TYPE="minor"
            else
              RELEASE_TYPE="patch"
            fi
          fi
          
          echo "Release type: $RELEASE_TYPE"
          
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # Calculate new version
          if [ "$RELEASE_TYPE" == "major" ]; then
            NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print ($1+1)".0.0"}')
          elif [ "$RELEASE_TYPE" == "minor" ]; then
            NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print $1"." ($2+1) ".0"}')
          elif [ "$RELEASE_TYPE" == "patch" ]; then
            NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print $1"."$2"." ($3+1)}')
          else
            NEW_VERSION="$CURRENT_VERSION-rc.$(date +%Y%m%d%H%M%S)"
          fi
          
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          git add package.json package-lock.json

      - name: Build and test
        run: |
          npm run build
          npm run test:unit
          npm run lint

      
      - name: Package extension
        run: npm run package

      - name: Create Git tag
        run: |
          git commit -m "chore: release ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Changes in ${{ steps.version.outputs.version }}
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            Download the `.vsix` file and install using:
            ```bash
            code --install-extension financial-advisor-${{ steps.version.outputs.version }}.vsix
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') }}

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./financial-advisor-${{ steps.version.outputs.version }}.vsix
          asset_name: financial-advisor-${{ steps.version.outputs.version }}.vsix
          asset_content_type: application/zip

  # Publish to marketplaces (if tokens available)
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest
    needs: release
    if: success() && !contains(needs.release.outputs.version, 'rc')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: env.OVSX_PAT != ''
        run: npx ovsx publish -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish MCP Server to npm
        if: env.NPM_TOKEN != ''
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          # Note: This would require separate package.json for MCP server
          echo "MCP server publishing would happen here"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Fallback notification if publishing fails
  publish-fallback:
    name: Publish Fallback Notification
    runs-on: ubuntu-latest
    needs: [release, publish]
    if: failure() && needs.release.result == 'success'
    
    steps:
      - name: Notify manual publishing required
        run: |
          echo "::warning::Automated publishing failed. Manual publishing required:"
          echo "::warning::1. Download the .vsix file from the GitHub release"
          echo "::warning::2. Publish manually using: vsce publish --packagePath <file>.vsix"
          echo "::warning::3. Set up marketplace tokens in repository secrets for automation"

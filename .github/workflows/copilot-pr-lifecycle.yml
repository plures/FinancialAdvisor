name: Copilot PR Lifecycle
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 3158960
          private-key: ${{ secrets.PRAXIS_BOT_PRIVATE_KEY }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const author = pr.user?.login;
            const isCopilot = author === 'Copilot' || author === 'app/copilot-swe-agent' || author === 'copilot-swe-agent[bot]';
            if (!isCopilot) return core.info(`Not a Copilot PR (author: ${author})`);
            if (pr.draft) return core.info('PR is draft, waiting...');

            const reviews = await github.rest.pulls.listReviews({ ...context.repo, pull_number: pr.number });
            const hasReview = reviews.data.some(r => r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED');
            if (!hasReview) {
              try {
                await github.rest.pulls.requestReviewers({ ...context.repo, pull_number: pr.number, reviewers: ['Copilot'] });
                core.info('Requested Copilot review');
              } catch (e) { core.warning(`Review request failed: ${e.message}`); }
              return;
            }

            const lastReview = reviews.data.filter(r => ['APPROVED', 'CHANGES_REQUESTED'].includes(r.state)).pop();
            if (lastReview?.state === 'CHANGES_REQUESTED') return core.info('Changes requested, waiting for update');

            const prData = await github.rest.pulls.get({ ...context.repo, pull_number: pr.number });
            if (prData.data.mergeable_state === 'dirty') return core.info('Merge conflicts exist');

            if (lastReview?.state === 'APPROVED') {
              try {
                await github.rest.pulls.merge({ ...context.repo, pull_number: pr.number, merge_method: 'squash' });
                core.info(`Merged PR #${pr.number}`);
                try { await github.rest.git.deleteRef({ ...context.repo, ref: `heads/${pr.head.ref}` }); } catch {}
              } catch (e) { core.warning(`Merge failed: ${e.message}`); }
            }

name: Auto-approve Copilot runs

on:
  workflow_run:
    workflows: ['*']
    types: [requested]

permissions:
  actions: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.actor.login == 'Copilot'
    steps:
      - name: Approve workflow run
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
